version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 17 + TimescaleDB
  # ──────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: ofsec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ofsec}
      POSTGRES_USER: ${POSTGRES_USER:-ofsec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ofsec_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ofsec}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis 7 — Task broker + cache
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ofsec-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Qdrant — Vector database (Rust-based)
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ofsec-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ──────────────────────────────────────────────
  # Backend — FastAPI application
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ofsec-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ofsec}:${POSTGRES_PASSWORD:-ofsec_secret}@postgres:5432/${POSTGRES_DB:-ofsec}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://prometheus:9090
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────
  # Taskiq Worker — Async task processing
  # ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ofsec-worker
    restart: unless-stopped
    command: taskiq worker app.workers.taskiq_app:broker --fs-discover
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ofsec}:${POSTGRES_PASSWORD:-ofsec_secret}@postgres:5432/${POSTGRES_DB:-ofsec}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Prometheus — Metrics collection
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ofsec-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # ──────────────────────────────────────────────
  # Frontend — Next.js 15 dashboard
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ofsec-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

  # ──────────────────────────────────────────────
  # Nginx — Reverse proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ofsec-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
