# OfSec V3 — Grafana Observability Stack
# Usage: docker compose -f docker-compose.grafana.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ofsec-prometheus
    restart: unless-stopped
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - ofsec-net

  grafana:
    image: grafana/grafana-oss:11.2.0
    container_name: ofsec-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ofsec_grafana_admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    networks:
      - ofsec-net

volumes:
  prometheus-data:
  grafana-data:


networks:
  ofsec-net:
    driver: bridge
