# Redis 7 configuration for OfSec V3

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence (AOF for durability)
appendonly yes
appendfilename "ofsec.aof"
appendfsync everysec

# Security
protected-mode yes

# Performance
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
